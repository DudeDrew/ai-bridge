services:
  - type: web
    name: ai-bridge
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --log-level info
    
    envVars:
      - key: BRIDGE_API_KEY
        generateValue: true
      
      - key: DATABASE_URL
        fromDatabase:
          name: ai-bridge-db
          property: connectionString
      
      - key: OPENAI_API_KEY
        sync: false
      
      - key: ANTHROPIC_API_KEY
        sync: false
      
      - key: NOTION_TOKEN
        sync: false
      
      - key: OBSIDIAN_API_KEY
        sync: false
      
      - key: OBSIDIAN_API_URL
        sync: false
      
      - key: PINECONE_API_KEY
        sync: false
      
      - key: NOTION_WEBHOOK_SECRET
        sync: false
      
      - key: OBSIDIAN_WEBHOOK_SECRET
        sync: false
      
      - key: FLASK_ENV
        value: production

databases:
  - name: ai-bridge-db
    databaseName: ai_bridge
    user: bridge_user
    plan: starter
