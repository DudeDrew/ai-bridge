<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Bridge{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">

  <!-- Top navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">

        <!-- Brand -->
        <a href="{{ url_for('dashboard') }}" class="flex items-center gap-2 font-semibold text-slate-900 text-sm">
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
          </svg>
          AI Bridge
        </a>

        <!-- Actions -->
        <div class="flex items-center gap-3">
          <a href="{{ url_for('new_connection') }}"
             class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Connection
          </a>
          <a href="{{ url_for('logout') }}" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">
            Logout
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- Flash / alert messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
        {% for category, message in messages %}
          <div class="flex items-start gap-3 p-4 mb-2 rounded-lg border
            {% if category == 'error' %}bg-red-50 border-red-200 text-red-800
            {% elif category == 'success' %}bg-green-50 border-green-200 text-green-800
            {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}"
            x-data="{ show: true }" x-show="show">
            <span class="flex-1 text-sm">{{ message }}</span>
            <button @click="show = false" class="opacity-60 hover:opacity-100 transition-opacity text-lg leading-none">&times;</button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 mt-16 py-6 text-center text-xs text-slate-400">
    AI Bridge &mdash; Universal knowledge base sync platform
  </footer>

</body>
</html>
