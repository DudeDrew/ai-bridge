<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AI Bridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center">

  <div class="w-full max-w-sm px-4">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-2 text-indigo-600">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
        <span class="text-2xl font-bold text-slate-900">AI Bridge</span>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      <h1 class="text-lg font-semibold text-slate-900 mb-1">Sign in</h1>
      <p class="text-sm text-slate-500 mb-6">Enter your API key to access the dashboard.</p>

      {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
        <div class="mb-4">
          <label for="api_key" class="block text-sm font-medium text-slate-700 mb-1.5">
            API Key
          </label>
          <input
            id="api_key"
            name="api_key"
            type="password"
            required
            autofocus
            placeholder="Your BRIDGE_API_KEY"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                   placeholder-slate-400"
          />
        </div>
        <button type="submit"
          class="w-full py-2.5 px-4 bg-indigo-600 text-white text-sm font-medium rounded-lg
                 hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2
                 focus:ring-indigo-500 focus:ring-offset-2">
          Sign in
        </button>
      </form>

      <p class="mt-5 text-xs text-slate-400 text-center">
        The API key is set via the <code class="bg-slate-100 px-1 rounded">BRIDGE_API_KEY</code>
        environment variable.
      </p>
    </div>

  </div>
</body>
</html>
